name: Update and Obfuscate Worker

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worker-update
  cancel-in-progress: true   # 防止重复运行冲突

jobs:
  update-and-obfuscate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ⭐必须：避免 git 历史问题

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: |
          npm install -g javascript-obfuscator
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: 获取最新 release tag
        id: get_release
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases/latest | jq -r '.tag_name')
          echo "latest_tag=$latest_tag" >> $GITHUB_ENV

      - name: 读取当前版本号
        id: read_version
        run: |
          if [ -f "version.txt" ]; then
            current_version=$(tr -d '\n\r' < version.txt)
          else
            current_version=""
          fi
          echo "current_version=$current_version" >> $GITHUB_ENV

      - name: 判断是否更新
        id: check_update
        run: |
          if [ "$current_version" = "$latest_tag" ]; then
            echo "need_update=false" >> $GITHUB_ENV
          else
            echo "need_update=true" >> $GITHUB_ENV
          fi

      # ⭐只有需要更新才执行后续步骤
      - name: 下载最新版 worker.js
        if: env.need_update == 'true'
        run: |
          curl -L -o origin.js "https://github.com/bia-pain-bache/BPB-Worker-Panel/releases/download/${{ env.latest_tag }}/worker.js"

      - name: 混淆 JS 代码
        if: env.need_update == 'true'
        run: |
          javascript-obfuscator origin.js --output _worker.js \
            --compact true \
            --identifier-names-generator hexadecimal \
            --rename-globals false \
            --string-array false \
            --transform-object-keys false \
            --self-defending false \
            --simplify true

          echo "// Auto obfuscated at $(date -u)" >> _worker.js

      - name: 更新 version.txt
        if: env.need_update == 'true'
        run: echo "${{ env.latest_tag }}" > version.txt

      # ⭐关键修复：先同步再提交
      - name: 同步远程代码
        if: env.need_update == 'true'
        run: git pull --rebase origin main

      - name: 提交更改
        if: env.need_update == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🔁 Obfuscate _worker.js (version: ${{ env.latest_tag }})
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          pull: true
